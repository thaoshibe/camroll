<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>camroll · question collection</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>
  // Set theme before paint to avoid flash-of-wrong-theme.
  // Shares the same localStorage key as camroll_demo.html so theme
  // preference carries across pages of the same family.
  (function() {
    var t = null;
    try { t = localStorage.getItem('camroll-theme'); } catch (e) {}
    if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
/* ── THEME TOKENS — shared with camroll_demo.html ──────────── */
:root,
:root[data-theme="dark"] {
  --bg:            #0f0f0f;
  --bg-elev:       #161616;
  --bg-elev-2:     #1a1a1a;
  --bg-elev-3:     #1c1c1c;
  --border:        #2a2a2a;
  --border-strong: #5a5a5a;
  --text:          #ffffff;
  --text-mid:      #d8d4cc;
  --text-soft:     #b8b3a8;
  --text-dim:      #8e8a80;
  --text-faint:    #6f6a60;
  --text-ghost:    #555044;
  --accent:        #c8f060;
  --accent-text:   #c8f060;
  --accent-bub-bg: #191e10;
  --accent-bub-text: #d0e498;
  --accent-soft:   rgba(200,240,96,0.13);
  --accent-glow:   rgba(200,240,96,0.4);
  --accent-tint:   rgba(200,240,96,0.05);
  --accent-ring:   rgba(200,240,96,0.3);
  --shadow:        rgba(0,0,0,0.45);
  --scrollbar:     #252525;
  --header-bg:     rgba(15,15,15,0.85);
  --chip-text:     #0f0f0f;
}
:root[data-theme="light"] {
  --bg:            #fafafa;
  --bg-elev:       #ffffff;
  --bg-elev-2:     #f2f2f2;
  --bg-elev-3:     #ededed;
  --border:        #e2e2e2;
  --border-strong: #888888;
  --text:          #000000;
  --text-mid:      #111111;
  --text-soft:     #222222;
  --text-dim:      #444444;
  --text-faint:    #6a6a6a;
  --text-ghost:    #8a8a8a;
  --accent:        #2f6f0f;
  --accent-text:   #2a6310;
  --accent-bub-bg: #eef5dc;
  --accent-bub-text: #1c3a08;
  --accent-soft:   rgba(47,111,15,0.18);
  --accent-glow:   rgba(47,111,15,0.35);
  --accent-tint:   rgba(47,111,15,0.07);
  --accent-ring:   rgba(47,111,15,0.45);
  --shadow:        rgba(0,0,0,0.10);
  --scrollbar:     #cccccc;
  --header-bg:     rgba(250,250,250,0.85);
  --chip-text:     #ffffff;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif}
body{
  background:var(--bg); color:var(--text); font-size:16px;
  transition:background 0.18s, color 0.18s;
}

/* ── CHAT THREAD — styled like ChatGPT / Claude ─────────────── */
.thread{
  position:fixed;
  top:54px;          /* flush directly under the 54px header bar */
  left:0; right:0;
  bottom:170px;      /* leave room for the chatbar at the bottom */
  z-index:5;
  overflow-y:auto;
  scroll-behavior:smooth;
}
.thread::-webkit-scrollbar{ width:8px; }
.thread::-webkit-scrollbar-thumb{ background:var(--scrollbar); border-radius:4px; }
.thread::-webkit-scrollbar-thumb:hover{ background:var(--border-strong); }

.thread-inner{
  max-width:740px;
  margin:0 auto;
  padding:18px 20px 24px;
  display:flex; flex-direction:column;
  gap:10px;
}

/* A grouping ("turn") = one user message + one AI reply. Subtle separator
   between turns so the eye can parse where one conversation ends and the
   next begins. */
.turn{
  display:flex; flex-direction:column;
  gap:14px;
  padding:14px 0 18px;
  border-bottom:1px solid var(--border);
  animation:turn-in .35s ease-out both;
}
.turn:last-child{ border-bottom:none; }
@keyframes turn-in{
  from { opacity:0; transform:translateY(6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* A single chat message row: avatar on the left, content on the right */
.msg{
  display:flex; gap:12px;
  align-items:flex-start;
}
.msg .avatar{
  flex-shrink:0;
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; color:#fff;
  letter-spacing:0.02em;
  user-select:none;
}
.msg .body{
  flex:1; min-width:0;
  display:flex; flex-direction:column;
  gap:6px;
  padding-top:2px;
}
.msg .who{
  font-size:13px; font-weight:600;
  color:var(--text);
  line-height:1;
  letter-spacing:0.005em;
}
.msg .who .you-tag{
  font-size:10.5px; font-weight:600;
  color:var(--accent-text);
  margin-left:6px; letter-spacing:0.06em; text-transform:uppercase;
}
.msg .text{
  font-size:14.5px; line-height:1.55;
  color:var(--text-mid);
  white-space:pre-wrap;
  word-wrap:break-word;
}

/* AI assistant row — slightly muted text and a marker dot for the model name */
.msg.ai .avatar{
  background:var(--accent-tint);
  color:var(--accent-text);
  border:1px solid var(--accent-soft);
}
.msg.ai .who{ color:var(--text-soft); }
.msg.ai .text{ color:var(--text-mid); }

/* Image attachments on a user message — small rounded thumbnails like
   ChatGPT/Claude render uploaded images. NOT a hero photo. */
.attachments{
  display:flex; flex-wrap:wrap;
  gap:6px;
  margin-top:2px;
}
.attachment{
  width:128px; height:128px;
  border-radius:10px;
  overflow:hidden;
  background:var(--bg-elev-3);
  border:1px solid var(--border);
  position:relative;
  cursor:zoom-in;
  transition:transform .15s, border-color .15s;
}
.attachment:hover{
  border-color:var(--accent-ring);
  transform:translateY(-1px);
}
.attachment img{
  display:block; width:100%; height:100%; object-fit:cover;
}
/* When only one attachment → make it slightly larger / landscape */
.attachments.n-1 .attachment{ width:240px; height:160px; }
@media (max-width: 560px){
  .attachment{ width:96px; height:96px; }
  .attachments.n-1 .attachment{ width:200px; height:140px; }
}

/* "retrieved from your gallery" caption — small dimmed line above the
   AI's image grid, gives the photos context (this is camroll's answer,
   not the user's upload) */
.retrieved-tag{
  display:inline-flex; align-items:center; gap:6px;
  font-size:11.5px; letter-spacing:0.02em;
  color:var(--text-dim);
  margin-top:6px;
  padding:3px 9px;
  background:var(--accent-tint);
  border:1px solid var(--accent-soft);
  border-radius:14px;
  width:fit-content;
}
.retrieved-tag .dot{
  color:var(--accent); font-size:8px; line-height:1;
}

/* AI-side retrieved gallery — slightly larger thumbs and tighter grid
   so it reads as a "search result" not a user upload */
.attachments.retrieved{
  margin-top:8px;
  gap:5px;
}
.attachments.retrieved .attachment{
  width:144px; height:144px;
  border-radius:8px;
  border:1px solid var(--border);
}
.attachments.retrieved.n-1 .attachment{ width:280px; height:180px; }
.attachments.retrieved.n-2 .attachment{ width:170px; height:170px; }
@media (max-width: 560px){
  .attachments.retrieved .attachment{ width:104px; height:104px; }
  .attachments.retrieved.n-1 .attachment{ width:220px; height:150px; }
  .attachments.retrieved.n-2 .attachment{ width:140px; height:140px; }
}

/* ── HEADER — slim top bar across the whole page ────────────── */
.header{
  position:fixed; top:0; left:0; right:0;
  height:54px; z-index:50;
  display:flex; align-items:center;
  padding:0 18px;
  gap:14px;
  background:var(--header-bg);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.header .title{
  font-size:14px; font-weight:500; color:var(--text);
  letter-spacing:0.02em;
  white-space:nowrap;
}
.header .title strong{ color:var(--accent-text); font-weight:600; }
.header .sub{
  font-size:12.5px; color:var(--text-dim);
  line-height:1.4;
  flex:1; min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
@media (max-width: 720px){
  .header .sub{ display:none; }
}

.refresh-btn{
  flex-shrink:0;
  background:var(--bg-elev);
  border:1px solid var(--border);
  color:var(--text-soft);
  padding:6px 12px; border-radius:6px;
  font-family:'DM Sans',sans-serif; font-size:12.5px;
  letter-spacing:0.04em; cursor:pointer;
  transition:all .15s;
}
.refresh-btn:hover{
  border-color:var(--border-strong);
  color:var(--text); background:var(--bg-elev-2);
}

/* Theme toggle — same compact style as camroll_demo.html */
.theme-toggle {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-soft); cursor: pointer;
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1; padding: 0;
  transition: all 0.15s; flex-shrink: 0;
}
.theme-toggle:hover { color: var(--text); border-color: var(--border-strong); background: var(--bg-elev); }
.theme-toggle .icon-dark, .theme-toggle .icon-light { display: none; }
:root[data-theme="dark"] .theme-toggle .icon-dark { display: inline; }
:root[data-theme="light"] .theme-toggle .icon-light { display: inline; }

/* ── BOTTOM CHAT-BAR (ChatGPT-style) ──────────────────────── */
.chatbar-wrap{
  position:fixed;
  left:50%; bottom:22px;
  transform:translateX(-50%);
  width:min(720px, calc(100vw - 40px));
  z-index:50;
  display:flex; flex-direction:column;
  align-items:stretch;
  gap:10px;
  pointer-events:none;
}
.chatbar-wrap > *{ pointer-events:auto; }

/* "you" turn pending/saved states. While pending, the AI reply shows a
   playful rotating message + animated typing dots. When saved, we swap
   the text to something celebratory and pop a tiny ✓ chip on the user msg. */
.turn.you.pending .saving-msg .text{
  color:var(--text-soft);
  display:inline-flex; align-items:center; gap:8px;
}
.turn.you .saved-text{
  color:var(--text-mid);
  animation:saved-pop .45s cubic-bezier(.2,1.4,.4,1) both;
}
@keyframes saved-pop{
  0%   { opacity:0; transform:translateY(4px) scale(.96); }
  60%  { transform:translateY(0) scale(1.02); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}

/* Animated typing dots ("●●●") that play while the reply is pending */
.typing-dots{
  display:inline-flex; gap:3px; align-items:center;
  margin-left:2px;
}
.typing-dots span{
  width:5px; height:5px; border-radius:50%;
  background:var(--text-faint);
  animation:typing-dot 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(1){ animation-delay:0s; }
.typing-dots span:nth-child(2){ animation-delay:0.18s; }
.typing-dots span:nth-child(3){ animation-delay:0.36s; }
@keyframes typing-dot{
  0%, 80%, 100% { transform:scale(0.7); opacity:0.4; }
  40%           { transform:scale(1.0); opacity:1.0; }
}

/* Saved badge — small chip that pops in next to the user's name.
   Uses the accent color for both themes (lime in dark, deep green in light). */
.saved-chip{
  display:inline-block;
  margin-left:8px;
  font-size:10.5px; font-weight:700; letter-spacing:0.04em;
  color:var(--chip-text);
  background:var(--accent);
  padding:2px 7px; border-radius:10px;
  vertical-align:1px;
  animation:chip-pop .4s cubic-bezier(.2,1.6,.4,1) both;
  box-shadow:0 0 10px var(--accent-glow);
}
@keyframes chip-pop{
  0%   { opacity:0; transform:scale(.5) translateY(-2px); }
  100% { opacity:1; transform:scale(1)  translateY(0);    }
}

/* progress hint above the input */
.contrib-progress{
  align-self:center;
  background:var(--bg-elev);
  border:1px solid var(--border);
  color:var(--text-soft);
  font-size:12.5px; letter-spacing:0.03em;
  padding:5px 13px; border-radius:30px;
  backdrop-filter:blur(8px);
  display:flex; align-items:center; gap:8px;
}
.contrib-progress .pdot{
  width:6px; height:6px; border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
  animation:pdot-pulse 1.6s ease-in-out infinite;
}
@keyframes pdot-pulse{ 0%,100%{opacity:.5} 50%{opacity:1} }
.contrib-progress.done .pdot{ background:var(--accent); }
.contrib-progress b{ color:var(--text); font-weight:600; }

/* the chat input row */
.chatbar{
  display:flex; align-items:flex-end; gap:8px;
  background:var(--bg-elev);
  border:1px solid var(--border);
  border-radius:18px;
  padding:9px 9px 9px 16px;
  backdrop-filter:blur(14px);
  box-shadow:0 14px 40px var(--shadow);
  transition:border-color .15s, box-shadow .15s;
}
.chatbar:focus-within{
  border-color:var(--accent-ring);
  box-shadow:0 14px 40px var(--shadow), 0 0 0 3px var(--accent-tint);
}
#chat-input{
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-family:'DM Sans',sans-serif;
  font-size:14.5px; line-height:1.5;
  resize:none; padding:7px 0;
  max-height:120px; min-height:24px;
}
#chat-input::placeholder{ color:var(--text-ghost); }
#send-btn{
  width:36px; height:36px; border-radius:12px;
  background:var(--accent);
  color:var(--chip-text); border:none;
  font-size:16px; font-weight:700;
  cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:opacity .15s, transform .1s;
}
#send-btn:hover{ opacity:0.85; }
#send-btn:active{ transform:translateY(1px) scale(.97); }
#send-btn:disabled{
  background:var(--bg-elev-3); color:var(--text-ghost);
  cursor:not-allowed; box-shadow:none;
}
.chat-hint{
  align-self:center;
  font-size:11.5px; color:var(--text-ghost);
  letter-spacing:0.03em;
}

/* small responsiveness */
@media (max-width: 820px){
  .chatbar-wrap{ bottom:14px; width:calc(100vw - 24px); }
}

/* toast */
.toast{
  position:fixed;
  left:50%; bottom:22px;
  transform:translateX(-50%) translateY(20px);
  background:var(--bg-elev);
  border:1px solid var(--border-strong);
  color:var(--text);
  padding:11px 18px; border-radius:8px;
  font-size:13.5px;
  box-shadow:0 12px 30px var(--shadow);
  opacity:0; pointer-events:none;
  transition:all .25s;
  z-index:200;
  max-width:90vw;
  backdrop-filter:blur(8px);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
</style>
</head>
<body>

<!-- Slim top header bar -->
<div class="header">
  <span class="title">camroll · <strong>question collection</strong></span>
  <span class="sub">What would you ask an AI that remembers everything in your photo gallery? Browse the examples, then type your own below ↓</span>
  <button class="refresh-btn" onclick="reshuffle()" title="Show different examples">↻ shuffle</button>
  <button class="theme-toggle" title="Toggle theme" onclick="toggleTheme()">
    <span class="icon-dark">☀</span><span class="icon-light">☾</span>
  </button>
</div>

<!-- Chat thread of example conversations from other users -->
<div class="thread" id="thread">
  <div class="thread-inner" id="thread-inner"></div>
</div>

<div class="chatbar-wrap">
  <div class="contrib-progress" id="contrib-progress">
    <span class="pdot"></span>
    <span id="progress-text">Please contribute <b>0&nbsp;/&nbsp;5</b> questions</span>
  </div>
  <div class="chatbar">
    <textarea id="chat-input" rows="1"
      placeholder="Type a question you'd ask the AI about your camera roll…"></textarea>
    <button id="send-btn" disabled title="Send (Enter)">↑</button>
  </div>
  <div class="chat-hint">Enter to send · Shift + Enter for newline · auto-saved on send</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
// THEME (initial value set in <head> before paint).
// Same key + behaviour as camroll_demo.html so users get a consistent
// preference across pages of the camroll family.
// ─────────────────────────────────────────────────────────────
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('camroll-theme', next); } catch (e) {}
}

// ─────────────────────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────────────────────
const NUM_QUESTIONS = 5;

// Example chats from "other users". Each entry renders as a full chat turn:
//   • user message (avatar + name + question text + (optional) reference photo
//     they uploaded as context — usually 0 or 1)
//   • camroll AI reply bubble below — text + the photos camroll RETRIEVED
//     from their gallery as the answer (this is the "memory" superpower)
//
//   nUserImages → how many photos the user attached as context (0 or 1)
//   nAiImages   → how many photos camroll retrieves as the answer
//   keywords    → for picking matching photos from the embedded pool
const TARGET_QUESTIONS = 5;
const EXAMPLE_TASKS = [
  {
    name: 'Sarah K.',
    text: 'Pick the happiest photo of me and my younger brother together at home — I\'ll send it to him for his birthday.',
    aiReply: 'Found 17 photos of you two at home together. Here\'s the one with the strongest "happy" signal — both of you mid-laugh in the kitchen, Aug 2022. Want me to send it to him directly?',
    keywords:['friends', 'smile', 'home', 'indoor', 'kitchen', 'group', 'people', 'portrait', 'selfie'],
    nUserImages: 0, nAiImages: 1,
  },
  {
    name: 'Marcus T.',
    text: 'Turn my trip to New Zealand into a day-by-day travel diary.',
    aiReply: 'Detected your NZ trip: Mar 14–28, 2023, 412 photos across 9 locations. Here\'s a preview of the cover photos for the first few days — drafting the full 14-day diary now.',
    keywords:['travel', 'trip', 'mountain', 'landscape', 'lake', 'hiking', 'forest', 'sunset', 'nature'],
    nUserImages: 0, nAiImages: 4,
  },
  {
    name: 'Priya R.',
    text: 'My friend just sent me this — she says we\'ve been here before. I don\'t remember it. When did I go?',
    aiReply: 'Yes — you visited on Apr 19, 2019 around 3pm. That\'s a café on Carrer dels Sombrerers in Barcelona. Here\'s the matching photo from your gallery that day:',
    keywords:['street', 'building', 'city', 'cafe', 'restaurant', 'park', 'bridge', 'church', 'plaza'],
    nUserImages: 1, nAiImages: 1,
  },
  {
    name: 'David L.',
    text: 'What was my wife wearing on Liam\'s birthday last year?',
    aiReply: 'On Liam\'s birthday (May 4, 2024) she\'s in 23 of the 81 photos from that day. Morning: navy linen dress with white sneakers. Evening: cream blouse for dinner. Showing both:',
    keywords:['birthday', 'cake', 'family', 'wife', 'kid', 'child', 'party', 'gift'],
    nUserImages: 0, nAiImages: 2,
  },
  {
    name: 'Aiko M.',
    text: 'What should I eat tonight? Recommend something I usually enjoy — I\'m feeling indecisive.',
    aiReply: 'You photograph ramen, pasta, and warm noodle soups the most (~38% of food shots). Given tonight\'s cool weather, I\'d suggest tonkotsu — here are a few of your favorites from past visits:',
    keywords:['food', 'restaurant', 'meal', 'lunch', 'dinner', 'noodle', 'pasta', 'pizza', 'plate', 'coffee'],
    nUserImages: 0, nAiImages: 4,
  },
  {
    name: 'Tomás G.',
    text: 'I forgot to take a photo at this place when I was there — can you edit me into one?',
    aiReply: 'Got it! I found your visit: Sept 12, 2022, late afternoon. Using a recent solo photo of you in similar lighting — here\'s the location photo I\'ll work with as the base:',
    keywords:['landmark', 'monument', 'view', 'tower', 'statue', 'museum', 'church', 'plaza'],
    nUserImages: 1, nAiImages: 1,
  },
  {
    name: 'Hannah B.',
    text: 'Find every photo of my dog from this exact angle — head-on, looking up.',
    aiReply: 'Found 11 photos of Maple looking up at you. Here are the top 3 by sharpness — the most recent is from last Sunday\'s morning walk:',
    keywords:['dog', 'cat', 'pet', 'animal', 'puppy', 'kitten', 'paws', 'fur'],
    nUserImages: 1, nAiImages: 3,
  },
  {
    name: 'Jules P.',
    text: 'Make me a slideshow of the best 10 sunset photos from last year.',
    aiReply: 'You have 87 sunset photos from 2024. Here\'s a preview of the 4 strongest — picked for color contrast and unique locations. Building the 60-second slideshow now.',
    keywords:['sunset', 'sky', 'sun', 'evening', 'horizon', 'clouds', 'orange', 'landscape'],
    nUserImages: 0, nAiImages: 4,
  },
  {
    name: 'Mei W.',
    text: 'Pick the 5 best photos from Anna\'s wedding to send to her.',
    aiReply: 'From Anna\'s wedding (June 8, 2024) — here are 4 of my top picks: ceremony exit, first dance, cake-cutting close-up, and the candid of her laughing with her dad.',
    keywords:['wedding', 'bride', 'groom', 'church', 'cake', 'dress', 'reception', 'ceremony'],
    nUserImages: 0, nAiImages: 4,
  },
  {
    name: 'Noah F.',
    text: 'Suggest a birthday gift for my mom based on her hobbies in my photos.',
    aiReply: 'Your mom appears most often gardening (47 photos), with watercolor brushes (12), and on long hikes (28). Here\'s what I noticed — quality pruning shears or a hiking-friendly sketchbook would suit her well.',
    keywords:['mom', 'family', 'flower', 'garden', 'craft', 'home', 'portrait', 'smile'],
    nUserImages: 0, nAiImages: 2,
  },
  {
    name: 'Elena V.',

// Stable color generator from a name string — gives each user a consistent
// avatar tint without needing to ship avatar images. Lightness adapts to
// theme so initials stay readable on white avatars in light mode too.
function colorForName(name){
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const sat   = isLight ? 50 : 50;
  const light = isLight ? 42 : 38;
  return {
    bg:     `hsl(${hue}, ${sat}%, ${light}%)`,
    bgSoft: `hsla(${hue}, ${sat}%, ${light + 10}%, 0.18)`,
  };
}
function initialsFromName(name){
  return name.split(/\s+/).map(p => p[0]).join('').slice(0, 2).toUpperCase();
}

// ─────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────
let TASK_NODES = [];     // { photos, task }
let TASK_ELS = [];

// ─────────────────────────────────────────────────────────────
// Boot — no fetch needed, pool is embedded.
// ─────────────────────────────────────────────────────────────
function boot(){
  reshuffle();
  initForm();
}

function reshuffle(){
  buildScene();
  // Note: we deliberately do NOT call renderForm() here, so reshuffling the
  // example tasks doesn't wipe the user's already-contributed questions.
}

// Boot-time form init runs once.
function initForm(){
  renderForm();
}

// ─────────────────────────────────────────────────────────────
// Pick photos for tasks (keyword-matched) and fillers (random)
// ─────────────────────────────────────────────────────────────
// For each task pick keyword-matched photos for both:
//   • userPhotos = the (optional) reference image(s) the user attaches
//   • aiPhotos   = the photos camroll RETRIEVES from the gallery as the answer
// Both sets are drawn from the same pool but never overlap.
function pickTaskPhotos(tasks){
  const all = PHOTO_POOL.slice();
  if (!all.length) return tasks.map(t => ({ task: t, userPhotos: [], aiPhotos: [] }));

  const used = new Set();
  const pairs = [];

  // Score every unused photo against this task's keywords.
  function scoreFor(t){
    const scored = [];
    for (let i = 0; i < all.length; i++) {
      if (used.has(i)) continue;
      const p = all[i];
      const cap = (p.caption || '').toLowerCase();
      let score = 0;
      for (const kw of t.keywords) {
        if (cap.includes(kw)) score += 2;
      }
      score += Math.random() * 0.3; // tie-break shuffle
      if (score > 0) scored.push({ idx: i, score });
    }
    scored.sort((a, b) => b.score - a.score);
    return scored.map(s => s.idx);
  }
  function topUpRandom(picks, want){
    if (picks.length >= want) return picks;
    const free = [];
    for (let i = 0; i < all.length; i++) {
      if (!used.has(i) && !picks.includes(i)) free.push(i);
    }
    for (let i = free.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [free[i], free[j]] = [free[j], free[i]];
    }
    while (picks.length < want && free.length) picks.push(free.shift());
    return picks;
  }

  tasks.forEach(t => {
    const wantUser = Math.max(0, t.nUserImages || 0);
    const wantAi   = Math.max(1, t.nAiImages   || 1);

    // Pick the user's reference photo(s) first (just take the top match)
    let userPicks = [];
    if (wantUser > 0) {
      const ranked = scoreFor(t);
      userPicks = ranked.slice(0, wantUser);
      userPicks.forEach(i => used.add(i));
    }

    // Then pick AI-retrieved photos from what's left (keyword-matched).
    let aiPicks = scoreFor(t).slice(0, wantAi);
    aiPicks = topUpRandom(aiPicks, wantAi);
    aiPicks.forEach(i => used.add(i));

    pairs.push({
      task: t,
      userPhotos: userPicks.map(i => all[i]),
      aiPhotos:   aiPicks.map(i => all[i]),
    });
  });

  return pairs;
}

// ─────────────────────────────────────────────────────────────
// Build the chat thread of example conversations from other users.
// Each "turn" is a user message (avatar + name + image attachments
// + question text) followed by an AI reply bubble — like ChatGPT/Claude.
// ─────────────────────────────────────────────────────────────
function buildScene(){
  TASK_NODES = []; TASK_ELS = [];

  // 6 example conversations — long enough to feel like a real thread,
  // short enough to scan quickly before contributing.
  const shuffled = EXAMPLE_TASKS.slice().sort(() => Math.random() - 0.5);
  const chosenTasks = shuffled.slice(0, 6);
  const pairs = pickTaskPhotos(chosenTasks);

  pairs.forEach((pr) => {
    // We need at least the AI retrieval photos; user photos are optional.
    if (!pr.aiPhotos || !pr.aiPhotos.length) return;
    TASK_NODES.push({
      task: pr.task,
      userPhotos: pr.userPhotos,
      aiPhotos: pr.aiPhotos,
    });
  });

  const inner = document.getElementById('thread-inner');
  // Wipe just the example turns, preserve any "you" turns the user already added.
  inner.querySelectorAll('.turn.example').forEach(el => el.remove());

  // Build each example turn and prepend (so user contributions stay at bottom)
  const frag = document.createDocumentFragment();
  TASK_NODES.forEach((n, i) => {
    const turn = renderExampleTurn(n.task, n.userPhotos, n.aiPhotos);
    turn.style.animationDelay = (i * 60) + 'ms';
    frag.appendChild(turn);
    TASK_ELS.push(turn);
  });
  // Insert before any "you" turns so examples come first chronologically.
  const firstYou = inner.querySelector('.turn.you');
  if (firstYou) inner.insertBefore(frag, firstYou);
  else inner.appendChild(frag);

  // Auto-scroll to top so the user starts at the beginning of the "thread"
  const thread = document.getElementById('thread');
  if (thread) thread.scrollTop = 0;
}

// Build one full conversation turn: user message + AI reply
//   userPhotos → optional reference image(s) the user sent (small attachments)
//   aiPhotos   → photos camroll retrieved as the answer (shown ON the AI bubble)
function renderExampleTurn(task, userPhotos, aiPhotos){
  const turn = document.createElement('div');
  turn.className = 'turn example';

  turn.appendChild(renderUserMsg({
    name: task.name,
    text: task.text,
    photos: userPhotos,
  }));
  turn.appendChild(renderAiMsg(task.aiReply, aiPhotos));

  return turn;
}

// User message row: avatar (initials, color from name) + name + attachments + text
function renderUserMsg({ name, text, photos, isYou }){
  const msg = document.createElement('div');
  msg.className = 'msg user';

  const av = document.createElement('div');
  av.className = 'avatar';
  if (isYou) {
    // Use the shared accent token so the "You" avatar matches the
    // current theme (lime in dark mode, deep green in light mode).
    av.style.background = 'var(--accent)';
    av.style.color = 'var(--chip-text)';
    av.textContent = 'Y';
  } else {
    const c = colorForName(name);
    av.style.background = c.bg;
    av.textContent = initialsFromName(name);
  }
  msg.appendChild(av);

  const body = document.createElement('div');
  body.className = 'body';

  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = isYou ? 'You' : name;
  if (isYou) {
    const tag = document.createElement('span');
    tag.className = 'you-tag';
    tag.textContent = '· your contribution';
    who.appendChild(tag);
  }
  body.appendChild(who);

  if (photos && photos.length){
    const att = document.createElement('div');
    att.className = 'attachments n-' + photos.length;
    photos.forEach(p => {
      const a = document.createElement('div');
      a.className = 'attachment';
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = p.thumb;
      img.alt = '';
      img.onerror = () => { img.style.opacity = '0.15'; };
      a.appendChild(img);
      a.onclick = () => { if (p.page) window.open(p.page, '_blank', 'noopener'); };
      att.appendChild(a);
    });
    body.appendChild(att);
  }

  const tx = document.createElement('div');
  tx.className = 'text';
  tx.textContent = text;
  body.appendChild(tx);

  msg.appendChild(body);
  return msg;
}

// AI reply row. Optionally renders retrieved photos under the reply text,
// styled like a "search result" gallery (with a subtle "from your gallery" tag).
function renderAiMsg(text, retrievedPhotos){
  const msg = document.createElement('div');
  msg.className = 'msg ai';

  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = '✦';
  msg.appendChild(av);

  const body = document.createElement('div');
  body.className = 'body';

  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = 'camroll';
  body.appendChild(who);

  const tx = document.createElement('div');
  tx.className = 'text';
  tx.textContent = text;
  body.appendChild(tx);

  if (retrievedPhotos && retrievedPhotos.length){
    const tag = document.createElement('div');
    tag.className = 'retrieved-tag';
    tag.innerHTML = `<span class="dot">●</span> retrieved from your gallery · ${retrievedPhotos.length} photo${retrievedPhotos.length > 1 ? 's' : ''}`;
    body.appendChild(tag);

    const att = document.createElement('div');
    att.className = 'attachments retrieved n-' + retrievedPhotos.length;
    retrievedPhotos.forEach(p => {
      const a = document.createElement('div');
      a.className = 'attachment';
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = p.thumb;
      img.alt = '';
      img.onerror = () => { img.style.opacity = '0.15'; };
      a.appendChild(img);
      a.onclick = () => { if (p.page) window.open(p.page, '_blank', 'noopener'); };
      att.appendChild(a);
    });
    body.appendChild(att);
  }

  msg.appendChild(body);
  return msg;
}

// ─────────────────────────────────────────────────────────────
// FORM — chat-bar style. Each typed question gets sent on enter,
// shown as a bubble above the input, and auto-saved to the sheet.
// No "why" field. Indicator shows "X / 5 contributed".
// ─────────────────────────────────────────────────────────────
let CONTRIB_COUNT = 0;

function renderForm(){
  // Wipe any previous "you" turns and reset state.
  const inner = document.getElementById('thread-inner');
  inner.querySelectorAll('.turn.you').forEach(el => el.remove());
  CONTRIB_COUNT = 0;
  updateProgress();
  const inp = document.getElementById('chat-input');
  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
}

function updateProgress(){
  const txt = document.getElementById('progress-text');
  const wrap = document.getElementById('contrib-progress');
  if (CONTRIB_COUNT === 0) {
    txt.innerHTML = `Please contribute <b>0&nbsp;/&nbsp;${TARGET_QUESTIONS}</b> questions`;
    wrap.classList.remove('done');
  } else if (CONTRIB_COUNT < TARGET_QUESTIONS) {
    txt.innerHTML = `<b>${CONTRIB_COUNT}&nbsp;/&nbsp;${TARGET_QUESTIONS}</b> contributed — keep going!`;
    wrap.classList.remove('done');
  } else if (CONTRIB_COUNT === TARGET_QUESTIONS) {
    txt.innerHTML = `<b>${TARGET_QUESTIONS}&nbsp;/&nbsp;${TARGET_QUESTIONS}</b> — thank you! more is welcome ❤`;
    wrap.classList.add('done');
  } else {
    txt.innerHTML = `<b>${CONTRIB_COUNT}</b> contributed — you're amazing ❤`;
    wrap.classList.add('done');
  }
}

// Playful rotating phrases — feels alive, like Claude / Cursor agents do.
const SAVING_PHRASES = [
  'Babbomming…',
  'Noting it down…',
  'Tucking this into memory…',
  'Capturing your idea…',
  'Logging your thought…',
  'Filing this away…',
  'One sec…',
  'Beep boop — recording…',
];
const SAVED_PHRASES = [
  'Gotcha! 🎯  Question saved.',
  'Saved! Thank you so much. ❤',
  'Boom — locked in. 💾',
  'Got it! Appreciate you contributing.',
  'Noted! That\'s a great one. ✨',
  'Saved — keep \'em coming!',
  'Done! ✓  Your idea is in.',
  'Captured. 🙌 Thanks for sharing!',
];
function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

// Append a "You" turn to the chat thread (no images attached, since
// the user is asking the question, not the AI). Returns the turn element
// so we can mark it saved later.
function addContribBubble(text){
  CONTRIB_COUNT += 1;
  const inner = document.getElementById('thread-inner');

  const turn = document.createElement('div');
  turn.className = 'turn you pending';
  turn.appendChild(renderUserMsg({
    name: 'You',
    text: text,
    photos: null,
    isYou: true,
  }));

  // Optimistic playful "saving…" placeholder with animated typing dots.
  const ai = renderAiMsg('');
  ai.classList.add('saving-msg');
  const txEl = ai.querySelector('.text');
  if (txEl) {
    const phrase = document.createElement('span');
    phrase.className = 'saving-phrase';
    phrase.textContent = pickRandom(SAVING_PHRASES);
    txEl.appendChild(phrase);
    const dots = document.createElement('span');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    txEl.appendChild(dots);
  }
  turn.appendChild(ai);

  inner.appendChild(turn);

  // Smoothly scroll the thread to the new turn.
  const thread = document.getElementById('thread');
  if (thread) thread.scrollTop = thread.scrollHeight;

  updateProgress();
  return turn;
}

function markBubbleSaved(turn){
  turn.classList.remove('pending');
  turn.classList.add('saved');
  const txEl = turn.querySelector('.saving-msg .text');
  if (txEl) {
    txEl.innerHTML = '';
    const span = document.createElement('span');
    span.className = 'saved-text';
    span.textContent = pickRandom(SAVED_PHRASES);
    txEl.appendChild(span);
  }
  // Pop a small green "saved" chip next to the user's name.
  const who = turn.querySelector('.msg.user .who');
  if (who && !who.querySelector('.saved-chip')) {
    const chip = document.createElement('span');
    chip.className = 'saved-chip';
    chip.textContent = '✓ saved';
    who.appendChild(chip);
  }
}

// ─────────────────────────────────────────────────────────────
// SAVE  → log to Google Sheet (same endpoint as camroll_demo.html)
// ─────────────────────────────────────────────────────────────
const LOG_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwiQLx3kQjNeG5J-7fu5Cpf1za5WZC7fvPKoNmVDFPEOL_kQr3wX7R0Chnz4yXrBTf7/exec';
const SESSION_ID = (crypto.randomUUID ? crypto.randomUUID()
  : String(Date.now()) + '-' + Math.random().toString(36).slice(2));

function logOne(payload){
  if (!LOG_ENDPOINT) return Promise.resolve();
  try {
    return fetch(LOG_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    }).catch(() => {});
  } catch (_) {
    return Promise.resolve();
  }
}

async function sendQuestion(text){
  text = (text || '').trim();
  if (!text) return;
  const bub = addContribBubble(text);
  const submittedAt = new Date().toISOString();
  await logOne({
    question: `[collection] Q${CONTRIB_COUNT}: ${text}`,
    user: null,
    session_id: SESSION_ID,
    page_url: location.href,
    ua: navigator.userAgent,
    kind: 'question_collection',
    q_idx: CONTRIB_COUNT,
    q_text: text,
    submitted_at: submittedAt,
  });
  // Mark saved as soon as the log request finishes — the green ✓
  // is a truthful signal that the question made it to the sheet.
  markBubbleSaved(bub);
}

// ─────────────────────────────────────────────────────────────
// Chat-bar wiring
// ─────────────────────────────────────────────────────────────
const inp = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

inp.addEventListener('input', () => {
  sendBtn.disabled = !inp.value.trim();
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
});
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    submitFromInput();
  }
});
sendBtn.addEventListener('click', submitFromInput);

function submitFromInput(){
  const v = inp.value.trim();
  if (!v) return;
  sendQuestion(v);
  inp.value = '';
  inp.style.height = 'auto';
  sendBtn.disabled = true;
  inp.focus();
}

// ─────────────────────────────────────────────────────────────
// utils
// ─────────────────────────────────────────────────────────────
function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

let toastTimer = null;
function toast(msg, isErr){
  const el = document.getElementById('toast');
  el.textContent = msg;
  if (isErr) el.style.borderColor = '#e0a0a0';
  else el.style.borderColor = '';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// Warn before leaving if there's text in the input the user hasn't sent yet.
window.addEventListener('beforeunload', e => {
  const cur = (inp.value || '').trim();
  if (cur.length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

boot();
</script>
